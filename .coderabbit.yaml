reviews:
  review_status: true # 리뷰 완료 상태나 진행 상태를 PR에 표시
  request_changes_workflow: false # GitHub의 Request changes 워크플로우를 적극적으로 사용할지 여부
    # false : 팀이 AI를 보조 Reviewer로 사용하고 싶을 때 적합
  high_level_summary: true # 리뷰 상단에 이번 PR이 무엇을 바꾸는지 큰 그림 요약을 붙임
  poem: false
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - develop

language: ko